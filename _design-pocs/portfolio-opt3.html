<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Portfolio — Option 3 · Numbered case studies</title>
<link rel="stylesheet" href="portfolio-shared.css">
<style>
  .cases{padding:24px 0 90px;display:flex;flex-direction:column;gap:clamp(30px,5vw,56px)}
  .case{display:grid;grid-template-columns:auto 1fr;gap:clamp(18px,3vw,34px)}
  .num{font-family:"Space Grotesk";font-weight:700;font-size:clamp(2.2rem,5vw,3.4rem);line-height:1;
       background:linear-gradient(160deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;
       padding-top:4px}
  .casebody{display:grid;grid-template-columns:1fr .95fr;gap:clamp(20px,3vw,40px);align-items:center;
            border-left:1px solid var(--hair);padding-left:clamp(18px,3vw,34px)}
  .casebody .txt{max-width:30rem}
  @media(max-width:820px){ .casebody{grid-template-columns:1fr;gap:18px} }
  @media(max-width:560px){ .case{grid-template-columns:1fr;gap:10px} .casebody{border-left:0;padding-left:0} }
</style>
</head>
<body>
  <div class="frame">
    <div class="head">
      <div class="eyebrow">// selected engagements</div>
      <h1>Project portfolio</h1>
      <p>Five case studies, numbered. Each pairs the business problem with a live chart of how it was actually solved.</p>
    </div>
    <div class="cases" id="cases"></div>
  </div>
  <div class="badge">Option 3 · Numbered case studies</div>
  <script src="portfolio-charts.js"></script>
  <script>
    const root=document.getElementById('cases');
    PC.PROJECTS.forEach((p,i)=>{
      const c=document.createElement('div'); c.className='case';
      const num=document.createElement('div'); num.className='num'; num.textContent='0'+(i+1);
      const body=document.createElement('div'); body.className='casebody';
      const txt=document.createElement('div'); txt.className='txt';
      txt.innerHTML=`<span class="tag">${p.tag}</span><h3 class="ptitle">${p.title}</h3><p class="blurb">${p.blurb}</p>`;
      body.appendChild(txt);
      body.appendChild(PC.panel(p.type,p.cap));
      c.appendChild(num); c.appendChild(body);
      root.appendChild(c);
    });
  </script>
</body>
</html>

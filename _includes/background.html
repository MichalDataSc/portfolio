<!-- Site-wide animated background: dark gradient (CSS) + neural network (here). -->
<canvas id="net"></canvas>
<div class="glow a"></div><div class="glow b"></div>
<script>
(() => {
  const cv = document.getElementById('net');
  if (!cv) return;
  const x = cv.getContext('2d');
  let w, h, dpr, nodes = [], mouse = { x: -999, y: -999 };
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  function size(){
    dpr = Math.min(devicePixelRatio || 1, 2);
    w = cv.width = innerWidth * dpr; h = cv.height = innerHeight * dpr;
    cv.style.width = innerWidth + 'px'; cv.style.height = innerHeight + 'px';
    build();
  }
  function build(){
    const n = Math.round(innerWidth * innerHeight / 16000); nodes = [];
    for (let i = 0; i < n; i++) nodes.push({
      x: Math.random()*w, y: Math.random()*h,
      vx: (Math.random()-.5)*.22*dpr, vy: (Math.random()-.5)*.22*dpr,
      r: (Math.random()*1.4+.5)*dpr
    });
  }
  addEventListener('resize', size);
  addEventListener('mousemove', e => { mouse.x = e.clientX*dpr; mouse.y = e.clientY*dpr; });
  addEventListener('mouseout', () => { mouse.x = mouse.y = -999; });
  const LINK = 130;
  function draw(){
    x.clearRect(0,0,w,h);
    for (const p of nodes){
      p.x += p.vx; p.y += p.vy;
      if (p.x<0||p.x>w) p.vx*=-1; if (p.y<0||p.y>h) p.vy*=-1;
      const dm = Math.hypot(p.x-mouse.x, p.y-mouse.y);
      if (dm < 150*dpr){ const f=(150*dpr-dm)/(150*dpr); p.x += (p.x-mouse.x)/dm*f; p.y += (p.y-mouse.y)/dm*f; }
    }
    const L = LINK*dpr;
    for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++){
      const a=nodes[i], b=nodes[j], d=Math.hypot(a.x-b.x, a.y-b.y);
      if (d<L){ const o=(1-d/L)*.4; x.strokeStyle='rgba(99,160,248,'+o+')'; x.lineWidth=dpr*.6;
        x.beginPath(); x.moveTo(a.x,a.y); x.lineTo(b.x,b.y); x.stroke(); }
    }
    for (const p of nodes){
      const dm=Math.hypot(p.x-mouse.x,p.y-mouse.y), lit=dm<150*dpr;
      x.beginPath(); x.arc(p.x,p.y,p.r*(lit?1.6:1),0,7);
      x.fillStyle = lit ? '#9fe3ff' : 'rgba(140,180,240,.7)'; x.fill();
    }
    if (!reduce) requestAnimationFrame(draw);
  }
  size(); draw();
})();
</script>
